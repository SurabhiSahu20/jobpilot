services:
  # JobPilot Express Web API Service
  - type: web
    name: jobpilot-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: USE_MOCK_DB
        value: "false"
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: jobpilot-db
          property: connectionString

databases:
  # Managed PostgreSQL DB (Free Tier)
  - name: jobpilot-db
    plan: free
